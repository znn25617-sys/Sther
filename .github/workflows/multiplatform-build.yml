name: Multi-Platform Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-build:
    name: Lint & Vite Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (Vite production + PWA)
        run: npm run build

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/
          if-no-files-found: error
          retention-days: 14

  capture-screens:
    name: Capture & UI Test (Playwright)
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Preview web app (background)
        run: npm run preview -- --port 4173 --host &
        env:
          # Allow the preview server to stay up for the capture script.
          CI: 'true'

      - name: Wait for preview server
        run: |
          for i in $(seq 1 30); do
            if curl -sSf http://localhost:4173 > /dev/null 2>&1; then
              echo "Preview server is up."
              exit 0
            fi
            sleep 1
          done
          echo "Preview server did not start in time."
          exit 1

      - name: Run capture script
        run: node scripts/capture.mjs http://localhost:4173

      - name: Upload QA screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: qa-screenshots
          path: artifacts/
          if-no-files-found: error
          retention-days: 14

  electron-windows:
    name: Electron Windows Portable EXE
    runs-on: windows-latest
    needs: lint-and-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Package Electron (Windows portable .exe)
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows portable EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-exe
          path: |
            release/*.exe
            release/*.yml
          if-no-files-found: error
          retention-days: 14
